; PlatformIO project configuration — P3R-inspired wearable MP3 player
; MCU: ESP32-S3 Super Mini

[env:esp32s3_super_mini]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200

; Library dependencies — Step 1 (display) + Step 2 (audio) + Step 4 (sensors)
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    schreibfaul1/ESP32-audioI2S @ ^2.0.7
    adafruit/Adafruit MPU6050 @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9

; Flash/PSRAM config for S3
board_build.arduino.memory_type = qio_opi
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM          ; ESP32-audioI2S uses PSRAM for decode buffers when available
