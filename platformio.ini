; PlatformIO project configuration — P3R-inspired wearable MP3 player
; MCU: ESP32-S3 Super Mini

; ─── Release build ────────────────────────────────────────────────────────────

[env:esp32s3_super_mini]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

; Library dependencies.
; BLE (Step 6) uses the ESP32 Arduino core built-in stack — no extra entry.
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9      ; display.h / display.cpp
    adafruit/Adafruit GFX Library @ ^1.11.9  ; display.h / display.cpp
    https://github.com/schreibfaul1/ESP32-audioI2S.git    ; audio.h / audio.cpp
    adafruit/Adafruit MPU6050 @ ^2.2.4       ; sensors.h / sensors.cpp
    adafruit/Adafruit Unified Sensor @ ^1.1.9 ; sensors.h / sensors.cpp

; Flash / PSRAM config for S3
board_build.arduino.memory_type = qio_opi
build_flags =
    -DARDUINO_USB_MODE=0            ; native USB OTG (TinyUSB) — required for USB MSC
    -DARDUINO_USB_CDC_ON_BOOT=1     ; Serial output via USB CDC when OTG mode active
    -DBOARD_HAS_PSRAM               ; ESP32-audioI2S uses PSRAM for decode buffers
    -DCORE_DEBUG_LEVEL=0            ; suppress all ESP-IDF debug output in release

; ─── Debug build ──────────────────────────────────────────────────────────────

[env:esp32s3_debug]
extends   = env:esp32s3_super_mini  ; inherit all settings above
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=5            ; VERBOSE: all ESP-IDF log levels enabled
    -DDEBUG_ESP_PORT=Serial
